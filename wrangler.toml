name = "petefixes-redesign"
compatibility_date = "2026-04-15"
main = "./worker/index.js"

[vars]
ADMIN_USER = "admin"
SQUARE_APP_ID = "sandbox-sq0idb-HrpOwCmlKx1ij0tUxD0B-Q"
SQUARE_ENV = "sandbox"
# Secrets (set with `wrangler secret put <NAME>`):
#   ADMIN_PASS          — basic-auth password for /services/fence-admin
#   SQUARE_ACCESS_TOKEN — Square API token

[assets]
directory = "./"
binding = "ASSETS"
not_found_handling = "404-page"
run_worker_first = ["/services/fence-admin*", "/api/*"]

# Cloud-stored admin config (pricing recipes + master pricelist + branding).
# Read by /api/config GET, written by /api/config PUT (auth-protected).
[[kv_namespaces]]
binding = "CONFIG_KV"
id = "fe05798a39604d06b029cb2e012b96bc"
